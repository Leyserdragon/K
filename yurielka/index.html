<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athzyri</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff758c, #ffb6c1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 10px;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, .3);
            margin-bottom: 10px;
            text-align: center;
            font-size: 24px;
        }

        #maze {
            display: grid;
            gap: 1px;
            background: white;
            padding: 8px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
            max-width: 100%;
            overflow: auto;
        }

        .cell {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            border-radius: 2px;
        }

        .wall {
            background: #444;
            color: white;
        }

        .path {
            background: #fff;
            color: #bbb;
        }

        .player {
            background: #ffe4ec;
            font-size: 18px;
        }

        .goal {
            background: #fff5b8;
            font-size: 18px;
        }

        .controls {
            margin-top: 10px;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 12px;
            font-size: 22px;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .2);
            cursor: pointer;
        }

        button:active {
            transform: scale(.95);
        }

        #win {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            display: none;
            z-index: 999;
            box-shadow: 0 0 30px rgba(0, 0, 0, .4);
        }

        #win h1 {
            color: #ff4d6d;
        }

        #win img {
            width: 50%;
            border-radius: 15px;
            margin: 15px 0;
        }

        #win p {
            color: #555;
            font-size: 18px;
        }

        .emoji {
            position: fixed;
            top: -50px;
            font-size: 30px;
            pointer-events: none;
            animation: caer 4s linear forwards;
        }

        @keyframes caer {
            from {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            to {
                transform: translateY(120vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <h1>❤️ Laberinto del Amor ❤️</h1>

    <div id="maze"></div>

    <div class="controls">
        <div class="row">
            <button onclick="move(-1,0)">⬆️</button>
        </div>

        <div class="row">
            <button onclick="move(0,-1)">⬅️</button>
            <button onclick="move(1,0)">⬇️</button>
            <button onclick="move(0,1)">➡️</button>
        </div>
    </div>

    <div id="win">
        <h1>❤️ ¡feliz mes de las cochonas <br> jajaja! ❤️</h1>

        <img id="img" src="fondo.jpeg" alt="Imagen de celebración">

        <p>
            recuerda que eres mu lesbiana favorita . 💕✨
        </p>
    </div>

    <script>

        const maze = [
            "11111111111111111111",
            "10000000000000000001",
            "10111111111111111101",
            "10100000000000000101",
            "10101111111111110101",
            "10101000000000100101",
            "10101011111110110101",
            "101010100G0010100101",
            "10101010111010111101",
            "10101010100010000001",
            "10101010101111111101",
            "10100000100000000101",
            "10111110111111110101",
            "10000010000000000101",
            "11111011111111110101",
            "10000000000000000101",
            "11111111111111111111"
        ];

        let playerRow = 1;
        let playerCol = 1;

        function drawMaze() {

            const mazeDiv = document.getElementById("maze");

            mazeDiv.style.gridTemplateColumns =
                `repeat(${maze[0].length},25px)`;

            mazeDiv.innerHTML = "";

            for (let r = 0; r < maze.length; r++) {

                for (let c = 0; c < maze[r].length; c++) {

                    const cell = document.createElement("div");
                    cell.classList.add("cell");

                    if (r === playerRow && c === playerCol) {

                        cell.classList.add("player");
                        cell.textContent = "❤️";

                    } else if (maze[r][c] === "1") {

                        cell.classList.add("wall");
                        cell.textContent = "1";

                    } else if (maze[r][c] === "G") {

                        cell.classList.add("goal");
                        cell.textContent = "🏰";

                    } else {

                        cell.classList.add("path");
                        cell.textContent = "0";
                    }

                    mazeDiv.appendChild(cell);
                }
            }
        }

        function move(dr, dc) {

            const nr = playerRow + dr;
            const nc = playerCol + dc;

            if (
                nr < 0 ||
                nc < 0 ||
                nr >= maze.length ||
                nc >= maze[nr].length
            ) {
                return;
            }

            if (maze[nr][nc] === "1") {
                return;
            }

            playerRow = nr;
            playerCol = nc;

            drawMaze();

            if (maze[nr][nc] === "G") {
                ganar();
            }
        }

        let iniciado = false;

        function ganar() {

            if (iniciado) return;
            iniciado = true;

            document.getElementById("win").style.display = "block";

            const emojis = [
                "❤️",
                "💕",
                "💖",
                "💗",
                "💘",
                "💞",
                "✨",
                "🌸",
                "🏳️‍🌈"
            ];

            setInterval(() => {

                const emoji = document.createElement("div");

                emoji.className = "emoji";

                emoji.textContent =
                    emojis[Math.floor(Math.random() * emojis.length)];

                emoji.style.left =
                    Math.random() * 100 + "vw";

                emoji.style.fontSize =
                    (20 + Math.random() * 40) + "px";

                document.body.appendChild(emoji);

                setTimeout(() => {
                    emoji.remove();
                }, 4000);

            }, 100);
        }

        drawMaze();

    </script>

</body>

</html>
